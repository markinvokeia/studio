# liquibase.properties
# ─────────────────────────────────────────────────────────────────────────────
# Sensitive connection parameters (url, username, password) are injected via
# CLI flags by db-manager.sh at runtime. This file holds non-sensitive defaults
# and is safe to commit.
# ─────────────────────────────────────────────────────────────────────────────

# Master changelog entrypoint (relative to the Liquibase working directory)
changelogFile=changelogs/changelog-master.xml

# Application schema — overridden at runtime via --default-schema-name flag
defaultSchemaName=public

# Schema for DATABASECHANGELOG and DATABASECHANGELOGLOCK tracking tables
liquibaseSchemaName=public

# Logging level: OFF | SEVERE | WARNING | INFO | FINE | FINEST
logLevel=INFO

# Exclude schema names from generated changelogs (keeps output clean)
includeSchema=false

# Include catalog names in generated changelogs
includeCatalog=false
